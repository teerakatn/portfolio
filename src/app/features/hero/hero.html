<section id="hero" class="hero-section">
  <div class="hero-content" data-aos="fade-up">
    <p class="greeting">{{ 'hero.greeting' | translate }}</p>
    <h1 class="name">{{ 'hero.name' | translate }} </h1>
    <h2 class="role">{{ 'hero.role' | translate }}</h2>
    <p class="sub">{{ 'hero.sub' | translate }}</p>
    <div class="hero-actions">
      <a href="#portfolio" class="btn-primary" (click)="scrollToSection($event, 'portfolio')">{{ 'hero.cta' | translate }}</a>
      <a href="#contact" class="btn-outline" (click)="scrollToSection($event, 'contact')">{{ 'hero.contact' | translate }}</a>
    </div>
  </div>
  <!-- แทนที่ avatar-placeholder เดิม -->
  <div class="hero-image" data-aos="fade-left" data-aos-delay="200">
    <img src="assets/images/profile.jpg" alt="Profile" class="profile-img"/>
  </div>
</section>
